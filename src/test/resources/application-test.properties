spring.datasource.url=jdbc:h2:mem:goida;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false
app.auth.secret=test-secret-key
app.auth.token-ttl-seconds=3600
app.google.web-client-id=test-google-client-id
app.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
app.storage.upload-dir=./target/test-storage
app.storage.public-base-url=http://localhost
app.ai.provider=mock
app.ai.model=test-model
app.rates.provider=mock
app.receipt.provider=mock
