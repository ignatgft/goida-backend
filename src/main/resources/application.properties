spring.application.name=goida-ai-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}
server.error.include-message=always
spring.mvc.problemdetails.enabled=true

# PostgreSQL - явные значения по умолчанию для prod
spring.datasource.url=${DB_URL:jdbc:postgresql://10.0.1.10:5432/goida}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# H2 для локальной разработки (профиль local)
---
spring.config.activate.on-profile=local
spring.datasource.url=jdbc:h2:mem:goida;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

# Storage
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:20MB}

# App properties - общие для всех профилей
app.auth.secret=${AUTH_SECRET:local-development-secret-key-for-testing-only-must-be-long-enough}
app.auth.token-ttl-seconds=${AUTH_TOKEN_TTL_SECONDS:86400}
app.security.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://10.0.2.2:8080}
app.google.web-client-id=${GOOGLE_WEB_CLIENT_ID:}
app.google.jwk-set-uri=${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}
app.ai.provider=${AI_PROVIDER:mock}
app.ai.model=${OPENAI_MODEL:gpt-5.4-mini}
app.ai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.openai-key=${OPENAI_API_KEY:}
app.rates.provider=${RATES_PROVIDER:mock}
app.rates.api-key=${EXCHANGE_API_KEY:}
app.storage.upload-dir=${STORAGE_UPLOAD_DIR:./storage}
app.storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
app.receipt.provider=${RECEIPT_PROVIDER:mock}

# Prod профиль
---
spring.config.activate.on-profile=prod
app.auth.secret=${AUTH_SECRET:change-me-for-production}
app.ai.provider=${AI_PROVIDER:groq}
app.ai.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.ai.groq-api-key=${GROQ_API_KEY:}
app.ai.groq-base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
app.storage.upload-dir=${STORAGE_UPLOAD_DIR:/app/storage}
app.storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
