# Локальный профиль для разработки без Docker
spring.datasource.url=jdbc:h2:mem:goida;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Отключаем Flyway
spring.flyway.enabled=false

# JWT секрет для локальной разработки
app.auth.secret=local-development-secret-key-for-testing-only-must-be-long-enough

# CORS для локальной разработки
app.security.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080,http://10.0.2.2:8080

# Google OAuth (заглушка для локальной разработки)
app.google.web-client-id=dummy-client-id
app.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# Mock провайдеры
app.ai.provider=mock
app.rates.provider=mock
app.receipt.provider=mock

# Storage
app.storage.upload-dir=./storage
app.storage.public-base-url=http://localhost:8080
