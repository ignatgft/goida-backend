# Production профиль для Docker с PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

# Логирование HTTP запросов
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT
app.auth.secret=${AUTH_SECRET:change-me-for-production}
app.auth.token-ttl-seconds=${AUTH_TOKEN_TTL_SECONDS:86400}

# CORS
app.security.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://10.0.2.2:8080}

# Google OAuth
app.google.web-client-id=${GOOGLE_WEB_CLIENT_ID:}
app.google.jwk-set-uri=${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}

# AI (Groq)
app.ai.provider=${AI_PROVIDER:groq}
app.ai.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.ai.groq-api-key=${GROQ_API_KEY:}
app.ai.groq-base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}

# Rates
app.rates.provider=${RATES_PROVIDER:mock}
app.rates.api-key=${EXCHANGE_API_KEY:}

# Storage
app.storage.upload-dir=${STORAGE_UPLOAD_DIR:/app/storage}
app.storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:8080}

# Receipt
app.receipt.provider=${RECEIPT_PROVIDER:mock}

# Multipart
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:20MB}
