version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goida-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goida}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goida-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080,http://10.0.2.2:8080,http://57.151.105.173:3000}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-for-production}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
      GOOGLE_JWK_SET_URI: ${GOOGLE_JWK_SET_URI:-https://www.googleapis.com/oauth2/v3/certs}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      RATES_PROVIDER: ${RATES_PROVIDER:-mock}
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY:-}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-goida}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-false}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      STORAGE_UPLOAD_DIR: /app/storage
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://57.151.105.173:3000}
      MULTIPART_MAX_FILE_SIZE: 10MB
      MULTIPART_MAX_REQUEST_SIZE: 20MB
      RECEIPT_PROVIDER: ${RECEIPT_PROVIDER:-mock}
    volumes:
      - goida_storage:/app/storage
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
    name: dokploy-network

volumes:
  postgres_data:
    driver: local
  goida_storage:
    driver: local
